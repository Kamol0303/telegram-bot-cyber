<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEGA LUCKY WIN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="scam-page" data-page-title="landing.title">
  <div class="scam-header">
    <marquee data-i18n="landing.marquee"></marquee>
  </div>

  <div class="container py-4">
    <div class="text-center mb-2">
      <small class="scam-domain-bad">🔒 https://mega-lucky-win-official.uz/prize/claim</small>
    </div>
    <h1 class="text-center text-warning fw-bold display-5" data-i18n="landing.congrats"></h1>
    <p class="text-center grammar-error" data-i18n="landing.subtitle"></p>

    <div class="row justify-content-center my-4">
      <div class="col-md-6">
        <p class="text-center text-danger fw-bold" data-i18n="landing.countdown_label"></p>
        <div class="countdown-box" id="countdown">04:59</div>
      </div>
    </div>

    <div class="winner-ticker mb-4">
      <span id="winner-ticker-text" data-i18n="landing.ticker_loading"></span>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-4 col-lg">
        <div class="prize-card">
          <img src="/static/images/prize-byd.svg" alt="BYD Champion" class="prize-img mb-2">
          <h5 class="text-warning">BYD Champion</h5>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg">
        <div class="prize-card">
          <img src="/static/images/prize-iphone.svg" alt="iPhone 17" class="prize-img mb-2">
          <h5 class="text-warning">iPhone 17</h5>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg">
        <div class="prize-card">
          <img src="/static/images/prize-money.svg" alt="5,000,000 UZS" class="prize-img mb-2">
          <h5 class="text-warning">5 000 000 UZS</h5>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg">
        <div class="prize-card">
          <img src="/static/images/prize-apartment.svg" alt="Kvartira" class="prize-img mb-2">
          <h5 class="text-warning" data-i18n="landing.prize_apartment"></h5>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg">
        <div class="prize-card">
          <img src="/static/images/prize-car.svg" alt="Avtomobil" class="prize-img mb-2">
          <h5 class="text-warning" data-i18n="landing.prize_car"></h5>
        </div>
      </div>
    </div>

    <div class="text-center my-4">
      <p class="text-danger fw-bold fs-5" data-i18n="landing.winners_today"></p>
      <p class="text-muted small" data-i18n="landing.trust_line"></p>
      <button class="claim-btn" id="claim-btn" data-i18n="landing.claim_btn"></button>
    </div>

    <div class="text-center mt-4 trust-badges">
      <span data-i18n="landing.badge_bank"></span>
      <span data-i18n="landing.badge_ssl"></span>
      <span data-i18n="landing.badge_rating"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = initSessionFromUrl() || getSessionToken() || '';
      startCountdown('countdown', 299);
      initWinnerTicker();
      updateProgress({ landing_viewed: true });
      fetch(`/api/visit/ping?token=${encodeURIComponent(token)}`, { method: 'POST' })
        .catch(() => {});
      document.getElementById('claim-btn').addEventListener('click', () => {
        window.location.href = '/simulation';
      });
    });
  </script>
</body>
</html>
