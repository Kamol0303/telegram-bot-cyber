<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milliy Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bank-page" data-page-title="simulation.title">
  <div class="bank-header">
    <div class="bank-logo" data-i18n="simulation.bank_name"></div>
    <div class="bank-secure" data-i18n="simulation.secure"></div>
  </div>

  <div class="container py-4" style="max-width: 480px;">
    <div class="bank-card">
      <div class="bank-card-chip"></div>
      <h4 class="bank-title" data-i18n="simulation.form_title"></h4>
      <p class="bank-subtitle" data-i18n="simulation.form_subtitle"></p>

      <div id="step-card">
        <label class="bank-label" data-i18n="simulation.card_label"></label>
        <input type="text" id="card-input" class="bank-input"
               data-i18n-placeholder="simulation.card_placeholder"
               maxlength="19" autocomplete="off" inputmode="numeric">

        <div class="row mt-3">
          <div class="col-6">
            <label class="bank-label" data-i18n="simulation.expiry_label"></label>
            <input type="text" id="expiry-input" class="bank-input"
                   data-i18n-placeholder="simulation.expiry_placeholder"
                   maxlength="5" autocomplete="off" inputmode="numeric">
          </div>
          <div class="col-6">
            <label class="bank-label" data-i18n="simulation.cvv_label"></label>
            <input type="text" id="cvv-input" class="bank-input"
                   data-i18n-placeholder="simulation.cvv_placeholder"
                   maxlength="3" autocomplete="off" inputmode="numeric">
          </div>
        </div>

        <div id="card-warning" class="bank-error mt-3 d-none"></div>

        <button class="bank-btn w-100 mt-4" id="next-to-otp" data-i18n="simulation.next_btn"></button>

        <p class="bank-footer-note mt-3" data-i18n="simulation.footer_encrypt"></p>
      </div>

      <div id="step-otp" class="d-none">
        <div class="sms-notification">
          <div class="sms-header">
            <span data-i18n="simulation.sms_header"></span>
            <span class="sms-time" id="sms-time"></span>
          </div>
          <p class="sms-body">
            <span data-i18n="simulation.sms_prefix"></span>
            <strong id="training-code">------</strong>.
            <span data-i18n="simulation.sms_suffix"></span>
          </p>
        </div>

        <label class="bank-label mt-3" data-i18n="simulation.otp_label"></label>
        <input type="text" id="otp-input" class="bank-input text-center bank-otp-input"
               data-i18n-placeholder="simulation.otp_placeholder"
               maxlength="6" autocomplete="off" inputmode="numeric">

        <div id="otp-warning" class="bank-error mt-3 d-none"></div>

        <button class="bank-btn w-100 mt-4" id="submit-simulation" data-i18n="simulation.submit_btn"></button>

        <p class="bank-footer-note mt-3 text-center" data-i18n-html="simulation.resend"></p>
      </div>
    </div>

    <p class="text-center bank-trust mt-3" data-i18n="simulation.trust_cards"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/simulation.js"></script>
</body>
</html>
