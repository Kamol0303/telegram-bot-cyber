<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity Learning</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="learn-page" data-page-title="learn.title">
  <div class="container py-5">
    <h1 class="text-center mb-2" style="color: var(--cyber-blue);" data-i18n="learn.title"></h1>
    <p class="text-center text-muted mb-5" data-i18n="learn.subtitle"></p>

    <div class="learn-card">
      <h3 data-i18n="learn.phishing_title"></h3>
      <p data-i18n="learn.phishing_text"></p>
    </div>

    <div class="learn-card">
      <h3 data-i18n="learn.lottery_title"></h3>
      <p data-i18n="learn.lottery_text"></p>
    </div>

    <div class="learn-card">
      <h3 data-i18n="learn.telegram_title"></h3>
      <p data-i18n="learn.telegram_text"></p>
    </div>

    <div class="learn-card">
      <h3 data-i18n="learn.qr_title"></h3>
      <p data-i18n="learn.qr_text"></p>
    </div>

    <div class="learn-card">
      <h3 data-i18n="learn.payment_title"></h3>
      <p data-i18n="learn.payment_text"></p>
    </div>

    <div class="learn-card">
      <h3 data-i18n="learn.social_title"></h3>
      <p data-i18n="learn.social_text"></p>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="learn-card">
          <h3 data-i18n="learn.urgency_title"></h3>
          <p data-i18n="learn.urgency_text"></p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="learn-card">
          <h3 data-i18n="learn.fear_title"></h3>
          <p data-i18n="learn.fear_text"></p>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="learn-card">
          <h3 data-i18n="learn.reward_title"></h3>
          <p data-i18n="learn.reward_text"></p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="learn-card">
          <h3 data-i18n="learn.otp_title"></h3>
          <p data-i18n="learn.otp_text"></p>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="learn-card">
          <h3 data-i18n="learn.identity_title"></h3>
          <p data-i18n="learn.identity_text"></p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="learn-card">
          <h3 data-i18n="learn.fraud_title"></h3>
          <p data-i18n="learn.fraud_text"></p>
        </div>
      </div>
    </div>

    <div class="text-center mt-5">
      <a href="/quiz" class="cyber-btn btn-lg" data-i18n="learn.quiz_btn"></a>
    </div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateProgress({ learning_viewed: true });
    });
  </script>
</body>
</html>
